<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Get Industrial Remote Lawn Mower Wholesale Price & OEM Service</title>
  <meta name="description"
    content="Contact Shandong Shimen International Trade for quotation, wholesale cooperation, OEM ODM customization and business negotiation of industrial remote-controlled lawn mowers. Fast reply and professional export service provided.">
  <meta name="keywords"
    content="contact lawn mower supplier, industrial mower wholesale, OEM mower service, China machinery export cooperation">

  <!-- 核心图标（所有电脑浏览器） -->
  <link rel="icon" href="./common/images/icon.png" sizes="any">
  <!-- PNG 高清图标 -->
  <link rel="icon" href="./common/images/icon.png" sizes="32x32" type="image/png">
  <!-- 苹果设备（iPhone/iPad） -->
  <link rel="apple-touch-icon" href="./common/images/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./common/style.css">
  <style>
    .container .email-shimen:hover {
      color: var(--main) !important;
    }

    .sendLoading {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10000;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.4);
      display: none;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

<body>
  @@include('./common/nav.html')

  <div class="banner"
    style="background-image:url(./common/images/image_390189736613903.jpg); background-position: center top">
    <div class="banner-text">
      <h1 key="contact_title"></h1>
    </div>
  </div>

  <section class="section" style="padding-bottom: 20px;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 text-center">
          <h2 key="contactDesc1"></h2>
          <p key="contactDesc2"></p>
        </div>
      </div>
    </div>
  </section>

  @@include('./common/chatSection.html')

  <section class="section" style="padding-top: 20px;">
    <div class="container">
      <h3 style="margin-bottom: 12px; text-align: center;" key="contactDesc3"></h3>
      <p style="text-align: center; color: #999;">
        <span key="contactDesc4"></span>
        <a href="mailto:shimenintl@gmail.com" style="color: inherit;" class="email-shimen">shimenintl@gmail.com</a>
      </p>
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow border-0 p-4">
            <form id="contactForm" target="_blank">
              <div class="mb-3">
                <label for="company" class="form-label" key="c1"></label>
                <input type="text" class="form-control" id="company" name="company" required>
              </div>
              <div class="mb-3">
                <label for="user_name" class="form-label" key="c2"></label>
                <input type="text" class="form-control" id="user_name" name="user_name" required>
              </div>
              <div class="mb-3">
                <label for="user_phone" class="form-label" key="c3"></label>
                <input type="text" class="form-control" id="user_phone" name="user_phone" required>
              </div>
              <div class="mb-3">
                <label for="user_email" class="form-label" key="c4"></label>
                <input type="email" class="form-control" id="user_email" name="user_email" required>
              </div>
              <div class="mb-3">
                <label for="country" class="form-label" key="c5"></label>
                <input type="text" class="form-control" id="country" name="country" required>
              </div>
              <div class="mb-3">
                <label for="demand" class="form-label" key="c6"></label>
                <textarea class="form-control" id="demand" name="demand" rows="4"></textarea>
              </div>

              <!-- 新增的 FormSubmit 配置（隐藏域，不影响页面显示） -->
              <input type="hidden" name="_subject" value="【官网表单】新客户咨询">
              <!-- 人机验证：防止机器人、脚本、垃圾程序自动狂发表单、发垃圾邮件 -->
              <input type="hidden" name="_captcha" value="false">
              <input type="hidden" name="_template" value="table">
              <!-- 挡住机器人发垃圾广告 -->
              <input type="hidden" name="_honeypot" value="">

              <button type="submit" class="btn btn-main w-100" key="submit"></button>
            </form>
          </div>
        </div>
      </div>

      <p style="margin-top: 12px; text-align: center;" key="contactDesc5"></p>
    </div>
  </section>

  <!-- 弹窗logo -->
  <div class="sendLoading" id="sendLoading">
    <div>
      <div id="loading-animation" style="width: 15rem;"></div>
      <p key="sendEmail" style="color: #fff; text-align: center;"></p>
    </div>
  </div>

  @@include('./common/footer.html')

  <!-- 1. 引入 Lottie 播放器（CDN 永久免费） -->
  <script src="https://cdn.jsdelivr.net/npm/lottie-web@5/build/player/lottie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./common/data.js"></script>
  <script src="./common/constant.js"></script>
  <script src="./common/lang.js"></script>
  <script>
    function submitForm() {
      const form = document.getElementById('contactForm');
      if (!form) return;

      form.addEventListener('submit', async function (e) {
        // 必须放在第一行，阻止默认提交
        e.preventDefault();
        const sendLoadingEle = document.getElementById('sendLoading')
        const submitButton = form.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.textContent = lang[currentLang].committing;
        sendLoadingEle.style.display = 'flex';
        try {
          const workerUrl = "https://formsubmit.co/ajax/shimenintl@gmail.com";
          const formData = new FormData(form);

          const jsonObj = {};
          formData.forEach((value, key) => {
            // 处理多选框（同名多值转为数组）
            if (jsonObj[key]) {
              // 如果已存在该key，转为数组并追加值
              jsonObj[key] = Array.isArray(jsonObj[key])
                ? jsonObj[key]
                : [jsonObj[key]];
              jsonObj[key].push(value);
            } else {
              jsonObj[key] = value;
            }
          });

          const response = await fetch(workerUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(jsonObj)
          });

          if (response.ok) {
            form.reset();
            window.location.href = "thankyou.html"; // 可选：提交成功后跳转到感谢页面
          } else {
            const text = await response.text();
            throw new Error(`服务器错误: ${text}`);
          }
        } catch (error) {
          console.error('提交错误:', error);
          alert(lang[currentLang].commitFail);
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = lang[currentLang].submit;
          sendLoadingEle.style.display = 'none';
        }
      });
    }
    setTimeout(() => {
      submitForm();
    }, 1000);

    document.addEventListener('DOMContentLoaded', function () {
      lottie.loadAnimation({
        container: document.getElementById('loading-animation'),
        renderer: 'svg', // 渲染方式：svg 最清晰
        loop: true, // 循环播放
        autoplay: true, // 自动播放
        path: './common/json/sendEmail.json' // 你的 json 文件路径
      });
    });
  </script>
</body>

</html>
