<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimen - Professional Lawn Mower Manufacturer</title>

  <!-- 核心图标（所有电脑浏览器） -->
  <link rel="icon" href="./common/images/icon.png" sizes="any">
  <!-- PNG 高清图标 -->
  <link rel="icon" href="./common/images/icon.png" sizes="32x32" type="image/png">
  <!-- 苹果设备（iPhone/iPad） -->
  <link rel="apple-touch-icon" href="./common/images/icon.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./common/style.css">
</head>

<body>
  @@include('./common/nav.html')
<div id="page-content">
  <!-- 全屏轮播 -->
  <div id="carouselHome" class="carousel slide" data-bs-ride="carousel" data-bs-interval="4000">
    <div class="carousel-inner">
      <div class="carousel-item active" style="height:500px; background-image:url(./common/images/banner1.jpg)">
        <div class="carousel-caption">
          <h1 class="display-4" key="banner1">专业割草机 出口全球</h1>
          <p class="lead" key="banner2">山东世门国际贸易 · 品质值得信赖</p>
          <a href="products.html" class="btn btn-main mt-3" key="view">查看产品</a>
        </div>
      </div>
      <div class="carousel-item"
        style="height:500px; background-image:url(https://images.unsplash.com/photo-1558618666-fcd25c85cd64?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80)">
        <div class="carousel-caption">
          <h1 class="display-4" key="banner3">高效耐用 出口品质</h1>
          <p class="lead" key="banner4">多年外贸经验 · 服务全球客户</p>
          <a href="about.html" class="btn btn-main mt-3" key="aboutbtn">了解我们</a>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" data-bs-target="#carouselHome" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" data-bs-target="#carouselHome" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- 公司简介 -->
  <section class="section">
    <div class="container">
      <div class="text-center mb-5">
        <h2 key="about1">公司简介</h2>
      </div>
      <div class="row">
        <div class="col-lg-8">
          <p key="about2">山东世门国际贸易有限公司是一家集研发、生产、销售于一体的专业割草机制造企业，产品远销欧洲、美洲、亚洲等数十个国家和地区，以稳定品质和优质服务赢得全球客户认可。</p>
        </div>
        <div class="col-lg-4">
          <!-- TODO -->
          <!-- <video controls poster="https://www.w3schools.com/html/mov_bbb.mp4">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
          </video> -->
        </div>
      </div>
    </div>
  </section>

  <!-- 企业优势 -->
  <section class="section bg-light">
    <div class="container">
      <div class="text-center mb-5">
        <h2 key="advantage">企业优势</h2>
      </div>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card card-hover p-4 text-center h-100">
            <i class="fa fa-globe fa-3x text-success mb-3"></i>
            <h5 key="country"></h5>
            <p class="text-muted" key="countrydesc"></p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card card-hover p-4 text-center h-100">
            <i class="fa fa-cogs fa-3x text-success mb-3"></i>
            <h5 key="produce"></h5>
            <p class="text-muted" key="producedesc"></p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card card-hover p-4 text-center h-100" data-bs-toggle="modal" data-bs-target="#certModal"
            style="cursor:pointer;">
            <i class="fa fa-certificate fa-3x text-success mb-3"></i>
            <h5 key="cert"></h5>
            <p class="text-muted" key="certdesc"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 核心产品 -->
  <section class="section">
    <div class="container">
      <div class="text-center mb-5">
        <h2 key="corepro"></h2>
      </div>
      <div class="row g-4" id="coreproCont">
      </div>
    </div>
  </section>

  <!-- 应用场景轮播 -->
  <section class="section bg-light">
    <div class="container">
      <div class="text-center mb-5">
        <h2 key="scene">场景展示</h2>
      </div>
      <div id="sceneCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="5000">
        <div class="carousel-inner">
          <div class="carousel-item active" style="height:500px; background-image:url(./common/images/cj1.png)"></div>
          <div class="carousel-item" style="height:500px; background-image:url(./common/images/cj2.png)"></div>
          <div class="carousel-item" style="height:500px; background-image:url(./common/images/cj3.png)"></div>
          <div class="carousel-item" style="height:500px; background-image:url(./common/images/cj4.png)"></div>
          <div class="carousel-item" style="height:500px; background-image:url(./common/images/cj5.png)"></div>
        </div>
        <button class="carousel-control-prev" data-bs-target="#sceneCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" data-bs-target="#sceneCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>
  </section>

  <!-- 参展图 -->
  <section class="section">
    <div class="container">
      <div class="text-center mb-5">
        <h2 key="exh">展会风采</h2>
      </div>
      <img
        src="https://sc04.alicdn.com/kf/H31d9c9657dec4cb28f57e1ba4c6ecf1c9/286076456/H31d9c9657dec4cb28f57e1ba4c6ecf1c9.jpg"
        class="w-100 rounded shadow" alt="展会">
    </div>
  </section>

  <!-- 常见问题 FAQ -->
  <section class="section bg-light py-5">
    <div class="container">
      <div class="text-center mb-5">
        <h3 class="fw-bold" key="faq">常见问题</h3>
      </div>
      <div class="accordion" id="faqAccordion">
      </div>
    </div>
  </section>

  <!-- 1. 产品认证模态框（新增，点“产品认证”弹出） -->
  <div class="modal fade" id="certModal" tabindex="-1" aria-labelledby="certModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="certModalLabel" key="certTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-4 text-center">
            <div class="col-md-4">
              <img src="./common/images/cert6.png" class="img-fluid rounded shadow" alt="CE认证">
              <p class="mt-2 mb-0" key="cert1"></p>
              <small class="text-muted" key="certdesc1"></small>
            </div>
            <div class="col-md-4">
              <img src="./common/images/cert8.png" class="img-fluid rounded shadow" alt="GS认证">
              <p class="mt-2 mb-0" key="cert2"></p>
              <small class="text-muted" key="certdesc2"></small>
            </div>
            <div class="col-md-4">
              <img src="./common/images/cert7.png" class="img-fluid rounded shadow" alt="EPA认证">
              <p class="mt-2 mb-0" key="cert3"></p>
              <small class="text-muted" key="certdesc3"></small>
            </div>
          </div>
          <p class="mt-4 text-muted" key="certCont"></p>
        </div>
      </div>
    </div>
  </div>
</div>
  @@include('./common/footer.html')

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./common/data.js"></script>
  <script src="./common/constant.js"></script>
  <script src="./common/lang.js"></script>
</body>

</html>
