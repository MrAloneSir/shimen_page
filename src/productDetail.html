<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industrial Crawler Remote Controlled Lawn Mower | 45° Steep Slope Mower for Orchard & PV Station</title>
  <meta name="description"
    content="High-performance industrial crawler remote-controlled lawn mower with 200m remote control range, 1-20cm adjustable cutting height and 45° climbing capacity. Ideal for photovoltaic power stations, river embankments, orchards and wetland mowing, CE EPA certified and high efficiency.">
  <meta name="keywords"
    content="crawler remote lawn mower, 45 degree steep slope mower, PV station weeding machine, high efficiency industrial mower, CE certified mower">

  <!-- 核心图标（所有电脑浏览器） -->
  <link rel="icon" href="./common/images/icon.png" sizes="any">
  <!-- PNG 高清图标 -->
  <link rel="icon" href="./common/images/icon.png" sizes="32x32" type="image/png">
  <!-- 苹果设备（iPhone/iPad） -->
  <link rel="apple-touch-icon" href="./common/images/icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background: #f5f5f5;
      padding-bottom: 70px;
    }

    .product_container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      color: #333;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: #f8f9fa;
      border-color: #ccc;
    }

    .product-wrap {
      display: flex;
      gap: 24px;
      background: #fff;
      padding: 24px;
      border-radius: 10px;
    }

    .gallery-left {
      width: 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .thumb-item {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 2px solid transparent;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    .thumb-item.active {
      border-color: var(--main);
    }

    .main-show {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      border-radius: 8px;
      min-height: 500px;
      padding: 20px;
    }

    .main-show img,
    .main-show video {
      max-width: 100%;
      max-height: 500px;
      object-fit: contain;
      display: block;
    }

    .module {
      margin-top: 24px;
      background: #fff;
      padding: 28px;
      border-radius: 10px;
    }

    .module h2 {
      font-size: 20px;
      color: #222;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .desc {
      line-height: 1.8;
      color: #555;
      font-size: 15px;
    }

    .desc p {
      margin-bottom: 14px;
    }

    .points {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
    }

    .point {
      flex: 1;
      min-width: 260px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid var(--main);
    }

    .point h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #222;
    }

    .point p {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    .package {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 16px 24px;
      margin-top: 12px;
    }

    .package li {
      font-size: 15px;
      color: #444;
      display: flex;
      align-items: center;
    }

    .package li::before {
      content: "✔";
      color: var(--main);
      font-weight: bold;
      margin-right: 8px;
    }

    .params {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .params th,
    .params td {
      border: 1px solid #eee;
      padding: 14px 18px;
      text-align: left;
    }

    .params th {
      background: #f8f9fa;
      width: 160px;
      color: #333;
    }

    .float-contact {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: var(--main);
      color: #fff;
      text-align: center;
      line-height: 60px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      z-index: 999;
    }

    .float-contact:hover {
      background: var(--main-dark);
    }

    @media (max-width: 768px) {
      .product-wrap {
        flex-direction: column;
      }

      .gallery-left {
        width: 100%;
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 8px;
        height: auto;
      }

      .main-show {
        min-height: 320px;
      }

      .point {
        min-width: 100%;
      }

      .params th {
        width: 110px;
      }
    }

    /* 图片容器，定位用 */
    .img-box {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
      object-fit: cover;
      width: calc(25% - 7.5px);
      background-color: #ccc;
    }

    /* 按钮默认在底部外面 */
    .img-box .btn {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.5s ease;
    }

    /* 鼠标移上，滑上来 */
    .img-box:hover .btn {
      transform: translateY(0);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
    }

    .customProductLi:last-of-type {
      margin-bottom: 0 !important;
    }
  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./common/style.css">
</head>

<body>
  @@include('./common/nav.html')
  <div class="product_container">
    <!-- 返回按钮 -->
    <a href="javascript:history.back()" class="back-btn" key="gobackProduct"></a>

    <!-- 产品标题 -->
    <h1 class="product-title" id="productDetailTitle"></h1>

    <!-- 图片视频预览 -->
    <div class="product-wrap">
      <div class="gallery-left">
        <div id="thumbList"></div>
      </div>
      <div class="main-show" id="mainShow"></div>
    </div>

    <!-- 详情描述 -->
    <div class="module">
      <h2 key="productIntro"></h2>
      <div class="desc" id="productDetailDesc"></div>
    </div>

    <!-- 核心卖点 -->
    <div class="module">
      <h2>核心卖点</h2>
      <div class="points" id="coreSellingPoints"></div>
    </div>

    <!-- 包装清单 -->
    <div class="module">
      <h2 key="packList"></h2>
      <ul class="package" id="packList"></ul>
    </div>

    <!-- 规格参数 -->
    <div class="module">
      <h2 key="productSpecificationsDesc"></h2>
      <table class="params" id="productSpecifications"></table>
    </div>

    <!-- 定制化产品 -->
    <div class="module" id="customContainer" style="display: none;">
      <h2 key="productCustomization"></h2>
      <p key="customProductDesc"></p>
      <div id="customProductUl">
      </div>
    </div>

    <!-- 售后保障 -->
    @@include('./common/afterSaleContent.html')
  </div>

  <!-- 底部悬浮咨询按钮 -->
  <a href="contact.html" style="text-decoration:none;">
    <div class="float-contact" key="contactNow"></div>
  </a>
  @@include('./common/footer.html')
</body>

</html>
