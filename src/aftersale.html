<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>After-Sales - Shimen</title>
  <!-- 核心图标（所有电脑浏览器） -->
  <link rel="icon" href="./common/images/icon.png" sizes="any">
  <!-- PNG 高清图标 -->
  <link rel="icon" href="./common/images/icon.png" sizes="32x32" type="image/png">
  <!-- 苹果设备（iPhone/iPad） -->
  <link rel="apple-touch-icon" href="./common/images/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./common/style.css">
</head>

<body>
  @@include('./common/nav.html')

  <div class="banner"
    style="background-image:url(./common/images/image_950965224430487.png); background-position: center top">
    <div class="banner-text">
      <!-- <h1 key="aftersale_title">售后保障</h1> -->
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="row g-4">
        <div class="col-md-3">
          <div class="card card-hover p-4 text-center h-100">
            <i class="fa fa-shield-alt fa-3x text-success mb-3"></i>
            <h5 key="w1"></h5>
            <p class="small text-muted" key="afterSaleDesc1"></p>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card card-hover p-4 text-center h-100">
            <i class="fa fa-tools fa-3x text-success mb-3"></i>
            <h5 key="w2"></h5>
            <p class="small text-muted" key="afterSaleDesc2"></p>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card card-hover p-4 text-center h-100">
            <i class="fa fa-boxes fa-3x text-success mb-3"></i>
            <h5 key="w3"></h5>
            <p class="small text-muted" key="afterSaleDesc3"></p>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card card-hover p-4 text-center h-100">
            <i class="fa fa-comments fa-3x text-success mb-3"></i>
            <h5 key="w4"></h5>
            <p class="small text-muted" key="afterSaleDesc4"></p>
          </div>
        </div>
      </div>
      @@include('./common/afterSaleContent.html')
      <p key="contactUsYindao" style="text-align: center;"></p>

      <div style="text-align: center;">
        <a href="./contact.html" key="contact_title" class="btn btn-sm btn-main mt-2 mx-auto"></a>
      </div>
    </div>
  </section>

  @@include('./common/footer.html')
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./common/lang.js"></script>
</body>

</html>
