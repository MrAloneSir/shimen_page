<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Successful</title>
  <!-- 核心图标（所有电脑浏览器） -->
  <link rel="icon" href="./common/images/icon.png" sizes="any">
  <!-- PNG 高清图标 -->
  <link rel="icon" href="./common/images/icon.png" sizes="32x32" type="image/png">
  <!-- 苹果设备（iPhone/iPad） -->
  <link rel="apple-touch-icon" href="./common/images/icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .success-box {
      background: white;
      max-width: 600px;
      width: 100%;
      padding: 50px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      font-size: 60px;
      color: #28a745;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      color: #222;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: #65b32e;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: #438216;
    }
  </style>
</head>

<body style="background: url(./common/images/thanksbg.png) no-repeat center center; background-size: cover;">

  <div class="success-box">
    <div class="icon">✅</div>
    <h1 key="commitSucc"></h1>
    <p key="commitSuccDesc"></p>
    <a href="index.html" class="btn" key="commitSuccBtn"></a>
  </div>

</body>

</html>
<script src="./common/constant.js"></script>
<script src="./common/data.js"></script>
<script>
  currentLang = localStorage.getItem("lang") || "zh";

  const elements = document.querySelectorAll("[key]");
  elements.forEach((e) => {
    const key = e.getAttribute("key");
    if (lang[currentLang][key]) setHtmlWithoutFlash(e, lang[currentLang][key]);
  });

  function setHtmlWithoutFlash(el, html) {
    if (!hasHtmlTags(html)) el.textContent = html;
    const temp = document.createElement("div");
    temp.innerHTML = html;
    el.replaceChildren(...temp.childNodes);
  }
  function hasHtmlTags(str) {
    const doc = new DOMParser().parseFromString(str, "text/html");
    return Array.from(doc.body.childNodes).some((node) => node.nodeType === 1);
  }
</script>
