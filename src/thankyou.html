<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Successful</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .success-box {
      background: white;
      max-width: 600px;
      width: 100%;
      padding: 50px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      font-size: 60px;
      color: #28a745;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      color: #222;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: #65b32e;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: #438216;
    }
  </style>
</head>

<body style="background: url(./common/images/thanksbg.png) no-repeat center center; background-size: cover;">

  <div class="success-box">
    <div class="icon">✅</div>
    <h1>Submitted Successfully</h1>
    <p>Your message has been sent successfully. We will contact you as soon as possible.</p>
    <a href="index.html" class="btn">Return to Home</a>
  </div>

</body>

</html>
