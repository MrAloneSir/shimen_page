<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Shimen</title>
  <!-- 核心图标（所有电脑浏览器） -->
  <link rel="icon" href="./common/images/icon.png" sizes="any">
  <!-- PNG 高清图标 -->
  <link rel="icon" href="./common/images/icon.png" sizes="32x32" type="image/png">
  <!-- 苹果设备（iPhone/iPad） -->
  <link rel="apple-touch-icon" href="./common/images/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./common/style.css">
</head>

<body>
  @@include('./common/nav.html')

  <div class="banner"
    style="background-image:url(https://images.unsplash.com/photo-1572913017567-02f0649bc4fd?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80)">
    <div class="banner-text" style="text-align: center; white-space: nowrap;">
      <h1 key="directSale"></h1>
      <h3 key="supportService"></h3>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="row g-4" id="productListContainer" style="min-height: 200px;">
      </div>
    </div>
  </section>

  <!-- 产品详情模态框 -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">产品详情</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row">
            <div class="col-md-6">
              <img src="https://via.placeholder.com/500x400/65B32E/ffffff?text=Product+Detail" class="img-fluid"
                alt="产品">
            </div>
            <div class="col-md-6">
              <ul class="list-unstyled mt-3">
                <li class="mb-2"><strong>型号：</strong>SHM608</li>
                <li class="mb-2"><strong>发动机：</strong>隆鑫764cc 4冲程汽油发动机</li>
                <li class="mb-2"><strong>割草宽度：</strong>80cm</li>
                <li class="mb-2"><strong>割草高度：</strong>2-15cm可调</li>
                <li class="mb-2"><strong>遥控距离：</strong>200米</li>
                <li class="mb-2"><strong>认证：</strong>CE/EPA</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TODO: 后续增加在线客服功能 -->
  <!-- <a href="https://wa.me/8615315373122?text=你好，我想咨询一下" target="_blank">
    咨询客服
  </a> -->

  @@include('./common/footer.html')

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./common/constant.js"></script>
  <script src="./common/data.js"></script>
  <script src="./common/lang.js"></script>
</body>

</html>
